<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Forgot Password - Premium Store</title>

<link rel="stylesheet" href="style.css">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  svg, img {
    max-width: 70px !important;
    height: auto !important;
    display: block;
    margin: 0 auto 15px auto;
  }

  .forgot-card {
    background: #ffffff;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    width: 100%;
    max-width: 400px;
  }

  .forgot-card h2 {
    font-size: 22px;
    color: #1f2937;
    margin-bottom: 8px;
    text-align: center;
  }

  .forgot-card p {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 22px;
    text-align: center;
    line-height: 1.5;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .form-group input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .btn-submit {
    width: 100%;
    background-color: #2563eb;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .btn-submit:hover {
    background-color: #1d4ed8;
  }

  .back-to-login {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
  }

  .back-to-login a {
    color: #4b5563;
    text-decoration: none;
    font-weight: 500;
  }

  .back-to-login a:hover {
    color: #1f2937;
  }
</style>

</head>


<body>


<div class="auth-container">


<div class="auth-card">


<div class="auth-logo">

<svg viewBox="0 0 24 24">

<path d="M12 2L2 7l10 5 10-5-10-5Z"/>

<path d="M2 17l10 5 10-5"/>

<path d="M2 12l10 5 10-5"/>

</svg>

</div>


<h1>

Reset Password

</h1>


<p>

Enter your email to receive reset link

</p>



<form id="forgotForm">



<div class="input-group">

<label>

Email Address

</label>


<input

id="forgotEmail"

type="email"

placeholder="Enter your email"

required>


</div>



<button

type="submit"

class="primary-btn">

Send Reset Link

</button>



</form>



<div

id="forgotMessage"

class="success-message">

</div>



<div

id="forgotError"

class="error-message">

</div>



<div class="auth-links">


<a href="login.html">

Back To Login

</a>


</div>



</div>


</div>



<script

type="module"

src="forgot-password.js">

</script>


</body>


</html>
