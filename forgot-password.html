<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Forgot Password - Premium Store</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="auth-container">


<div class="auth-card">


<div class="auth-logo">

<svg viewBox="0 0 24 24">

<path d="M12 2L2 7l10 5 10-5-10-5Z"/>

<path d="M2 17l10 5 10-5"/>

<path d="M2 12l10 5 10-5"/>

</svg>

</div>


<h1>

Reset Password

</h1>


<p>

Enter your email to receive reset link

</p>



<form id="forgotForm">



<div class="input-group">

<label>

Email Address

</label>


<input

id="forgotEmail"

type="email"

placeholder="Enter your email"

required>


</div>



<button

type="submit"

class="primary-btn">

Send Reset Link

</button>



</form>



<div

id="forgotMessage"

class="success-message">

</div>



<div

id="forgotError"

class="error-message">

</div>



<div class="auth-links">


<a href="login.html">

Back To Login

</a>


</div>



</div>


</div>



<script

type="module"

src="forgot-password.js">

</script>


</body>


</html>
