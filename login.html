<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Login - Premium Store</title>

<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  
  /* SVG আইকন ছোট করার জন্য */
  svg, img {
    max-width: 80px !important;
    height: auto !important;
    display: block;
    margin: 0 auto 15px auto;
  }

  .login-card {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 16px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    background-color: #2563eb;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background-color: #1d4ed8;
  }
</style>

</head>


<body>


<div class="auth-container">


<div class="auth-card">


<div class="auth-logo">

<svg viewBox="0 0 24 24">

<path d="M12 2L2 7l10 5 10-5-10-5Z"/>

<path d="M2 17l10 5 10-5"/>

<path d="M2 12l10 5 10-5"/>

</svg>

</div>


<h1>

Welcome Back

</h1>


<p>

Login to continue shopping

</p>



<form id="loginForm">



<div class="input-group">

<label>

Email

</label>

<input

id="loginEmail"

type="email"

placeholder="Enter email"

required>

</div>



<div class="input-group">

<label>

Password

</label>

<input

id="loginPassword"

type="password"

placeholder="Enter password"

required>

</div>



<button

class="primary-btn"

type="submit">

Login

</button>



</form>



<div class="auth-links">

<a href="forgot-password.html">

Forgot Password?

</a>


<a href="register.html">

Create Account

</a>

</div>



<div id="loginError"

class="error-message">

</div>


</div>


</div>


<script type="module" src="login.js"></script>


</body>

</html>
