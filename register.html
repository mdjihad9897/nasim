<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Create Account - Premium Store</title>

<link rel="stylesheet" href="style.css">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ইমেজের সাইজ ছোট রাখার জন্য */
  svg, img {
    max-width: 70px !important;
    height: auto !important;
    display: block;
    margin: 0 auto 15px auto;
  }

  .register-card {
    background: #ffffff;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    width: 100%;
    max-width: 420px;
  }

  .register-card h2 {
    font-size: 24px;
    color: #1f2937;
    margin-bottom: 6px;
    text-align: center;
  }

  .register-card p {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 20px;
    text-align: center;
  }

  .form-group {
    margin-bottom: 15px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 5px;
  }

  .form-group input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .form-group input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .btn-submit {
    width: 100%;
    background-color: #2563eb;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background-color 0.2s;
  }

  .btn-submit:hover {
    background-color: #1d4ed8;
  }

  .bottom-text {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #4b5563;
  }

  .bottom-text a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
  }

  .bottom-text a:hover {
    text-decoration: underline;
  }
</style>


</head>


<body>


<div class="auth-container">


<div class="auth-card">


<div class="auth-logo">

<svg viewBox="0 0 24 24">

<path d="M12 2L2 7l10 5 10-5-10-5Z"/>

<path d="M2 17l10 5 10-5"/>

<path d="M2 12l10 5 10-5"/>

</svg>

</div>



<h1>

Create Account

</h1>


<p>

Join our premium shopping platform

</p>



<form id="registerForm">



<div class="input-group">

<label>

Full Name

</label>

<input

id="registerName"

type="text"

placeholder="Your name"

required>

</div>



<div class="input-group">

<label>

Email

</label>

<input

id="registerEmail"

type="email"

placeholder="Email address"

required>

</div>



<div class="input-group">

<label>

Phone

</label>

<input

id="registerPhone"

type="tel"

placeholder="Phone number"

required>

</div>



<div class="input-group">

<label>

Password

</label>

<input

id="registerPassword"

type="password"

placeholder="Create password"

minlength="6"

required>

</div>



<div class="input-group">

<label>

Confirm Password

</label>

<input

id="confirmPassword"

type="password"

placeholder="Confirm password"

required>

</div>



<button

class="primary-btn"

type="submit">

Register

</button>



</form>



<div id="registerError"

class="error-message">

</div>



<div class="auth-links">

<a href="login.html">

Already have account?

</a>

</div>


</div>


</div>


<script type="module" src="register.js"></script>


</body>

</html>
