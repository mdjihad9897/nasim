<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Create Account - Premium Store</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="auth-container">


<div class="auth-card">


<div class="auth-logo">

<svg viewBox="0 0 24 24">

<path d="M12 2L2 7l10 5 10-5-10-5Z"/>

<path d="M2 17l10 5 10-5"/>

<path d="M2 12l10 5 10-5"/>

</svg>

</div>



<h1>

Create Account

</h1>


<p>

Join our premium shopping platform

</p>



<form id="registerForm">



<div class="input-group">

<label>

Full Name

</label>

<input

id="registerName"

type="text"

placeholder="Your name"

required>

</div>



<div class="input-group">

<label>

Email

</label>

<input

id="registerEmail"

type="email"

placeholder="Email address"

required>

</div>



<div class="input-group">

<label>

Phone

</label>

<input

id="registerPhone"

type="tel"

placeholder="Phone number"

required>

</div>



<div class="input-group">

<label>

Password

</label>

<input

id="registerPassword"

type="password"

placeholder="Create password"

minlength="6"

required>

</div>



<div class="input-group">

<label>

Confirm Password

</label>

<input

id="confirmPassword"

type="password"

placeholder="Confirm password"

required>

</div>



<button

class="primary-btn"

type="submit">

Register

</button>



</form>



<div id="registerError"

class="error-message">

</div>



<div class="auth-links">

<a href="login.html">

Already have account?

</a>

</div>


</div>


</div>


<script type="module" src="register.js"></script>


</body>

</html>
